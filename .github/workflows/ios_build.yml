name: Build iOS IPA Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies & CocoaPods
        run: |
          cd mobile_app
          flutter pub get
          cd ios
          pod install

      - name: Build iOS App (.ipa payload)
        run: |
          cd mobile_app
          flutter build ios --release --no-codesign
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r PC_Control_iOS_v1.0.0.ipa Payload

      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PC_Control_iOS_v1.0.0.ipa
          path: mobile_app/PC_Control_iOS_v1.0.0.ipa
