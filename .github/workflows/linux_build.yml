name: Build Linux Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Linux Desktop Platform in Flutter
        run: |
          cd mobile_app
          flutter config --enable-linux-desktop
          flutter create --platforms=linux .

      - name: Build Linux Package (.tar.gz)
        run: |
          chmod +x installer/build_linux.sh
          ./installer/build_linux.sh

      - name: Upload Linux Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PC_Control_Linux_v1.0.0.tar.gz
          path: installer/Output/PC_Control_Linux_v1.0.0.tar.gz

      - name: Upload Linux Package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/PC_Control_Linux_v1.0.0.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
